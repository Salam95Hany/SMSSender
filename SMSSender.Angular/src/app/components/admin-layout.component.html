<main class="app-shell" [ngClass]="{ 'sidebar-collapsed': isSidebarCollapsed }">
    <app-admin-side-menu [isCollapsed]="isSidebarCollapsed" [isMobileOpen]="isMobileMenuOpen" (collapseToggle)="toggleSidebar()" (closeMobile)="closeMobileMenu()"></app-admin-side-menu>

    <button type="button" class="app-shell__backdrop" [ngClass]="{ active: isMobileMenuOpen }" (click)="closeMobileMenu()" aria-label="إغلاق القائمة الجانبية"></button>

    <div class="app-shell__main">
        <app-admin-header [isSidebarCollapsed]="isSidebarCollapsed" [isMobileMenuOpen]="isMobileMenuOpen" (menuToggle)="toggleSidebar()"></app-admin-header>

        <section class="app-shell__content">
            <router-outlet></router-outlet>
        </section>
    </div>
</main>
