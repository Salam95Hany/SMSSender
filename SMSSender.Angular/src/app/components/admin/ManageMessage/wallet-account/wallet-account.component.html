<section class="page-shell">
  <app-admin-breadcrumb
    title="رصيد المحافظ"
    subtitle="بطاقات مرنة لعرض المحافظ والأرصدة الحالية مع توزيع متجاوب مناسب للهاتف والكمبيوتر."
    icon="fas fa-wallet"
    [items]="[
      { label: 'إدارة الرسائل', route: '/admin/dashboard' },
      { label: 'رصيد المحافظ' }
    ]"
  ></app-admin-breadcrumb>

  <div class="surface-card page-panel">
    <div class="page-toolbar">
      <div class="page-toolbar__meta">
        <h2>المحافظ المتاحة</h2>
        <p>عرض منسق للأرصدة يساعد على المقارنة السريعة بين القنوات المختلفة.</p>
      </div>
    </div>

    <div class="wallet-grid">
      <article class="wallet-card" *ngFor="let wallet of wallets" [ngClass]="wallet.theme">
        <div class="wallet-card__top">
          <div class="wallet-card__icon">
            <i class="fas fa-wallet"></i>
          </div>
          <div class="wallet-card__owner">
            <h3>{{ wallet.owner }}</h3>
            <span>{{ wallet.provider }}</span>
          </div>
        </div>

        <div class="wallet-card__number">{{ wallet.number }}</div>

        <div class="wallet-card__footer">
          <span>الرصيد المتاح</span>
          <strong>{{ wallet.balance }}</strong>
        </div>
      </article>
    </div>
  </div>
</section>
