<nav aria-label="breadcrumb" class="min-breadcrumb py-2 px-2 mb-3 rounded">
    <ol class="breadcrumb m-0">
        <li class="me-2">
            <i class="fa fa-layer-group"></i>
        </li>
        <li class="breadcrumb-item">التقارير</li>
        <li class="breadcrumb-item">تقرير التحويلات</li>
    </ol>
</nav>

<div class="card radius-10 border-0 card-shadow">
    <div class="card-body">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div class="d-flex align-items-center flex-wrap gap-2">
                <button class="btn btn-secondary" (click)="isFilter = !isFilter" [attr.aria-expanded]="!isFilter">
                    <i class="fas fa-filter"></i>
                    <span class="ms-2">{{ isFilter ? 'عرض' : 'اخفاء' }} الفلاتر</span>
                </button>
            </div>
            <div>
                <app-admin-pagination (pageChanged)="pageChanged($event)" [currentPage]="PagingFilter.currentpage" [pageSize]="PagingFilter.pagesize" [totalCount]="TotalCount"></app-admin-pagination>
            </div>
        </div>
        <div class="py-2" #collapse="ngbCollapse" [(ngbCollapse)]="isFilter">
            <app-admin-filter [FilterList]="FilterList"></app-admin-filter>
        </div>
        <hr>
        <div class="table-responsive">
            <table class="table align-middle mb-0 table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Order Number</th>
                        <th>Supplier</th>
                        <th>Order Date</th>
                        <th>Sub Total</th>
                        <th>Discount</th>
                        <th>Tax</th>
                        <th>Total Value</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let item of OrdersList">
                        <td>{{item.orderNumber}}</td>
                        <td>{{item.supplierNameEn}}</td>
                        <td>{{item.orderDate | date}}</td>
                        <td>{{item.subTotal}}</td>
                        <td>{{item.discountAmount}}</td>
                        <td>{{item.tax}}</td>
                        <td>{{item.totalValue}}</td>
                        <td class="text-center">
                            <button class="btn btn-secondary me-2">
                                <i class="far fa-eye"></i>
                                <span class="ms-2">View</span>
                            </button>
                            <button class="btn btn-danger">
                                <i class="fas fa-times"></i>
                                <span class="ms-2">Cancel</span>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
