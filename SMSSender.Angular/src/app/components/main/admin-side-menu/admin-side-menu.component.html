<aside
  class="app-sidebar"
  [ngClass]="{
    'app-sidebar--collapsed': isCollapsed,
    'app-sidebar--mobile-open': isMobileOpen
  }"
>
  <div class="app-sidebar__top">
    <a class="app-sidebar__brand" routerLink="/admin/dashboard" (click)="onLinkClick()">
      <img src="logo.png" alt="SMS Sender" />
      <div *ngIf="!isCollapsed" class="app-sidebar__brand-copy">
        <strong>SMS Sender</strong>
        <span>لوحة الإدارة</span>
      </div>
    </a>

    <button
      type="button"
      class="app-sidebar__toggle"
      (click)="collapseToggle.emit()"
      [attr.aria-label]="isCollapsed ? 'توسيع القائمة' : 'طي القائمة'"
    >
      <i class="fas" [ngClass]="isCollapsed ? 'fa-angles-left' : 'fa-angles-right'"></i>
    </button>
  </div>

  <div class="app-sidebar__body small-scroll">
    <section class="app-sidebar__profile" *ngIf="!isCollapsed">
      <div class="app-sidebar__avatar">{{ userInitials }}</div>
      <div class="app-sidebar__profile-copy">
        <strong>{{ userModel?.fullName || userModel?.userName || 'مشرف النظام' }}</strong>
        <span>{{ userModel?.companyName || 'SMS Sender' }}</span>
      </div>
    </section>

    <div class="nav-group" *ngFor="let section of navigation">
      <div class="nav-group__label" *ngIf="!isCollapsed">{{ section.label }}</div>

      <div class="nav-group__items">
        <a
          *ngFor="let item of section.items"
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.exact ?? true }"
          [title]="item.label"
          (click)="onLinkClick()"
        >
          <i [class]="item.icon"></i>
          <span *ngIf="!isCollapsed">{{ item.label }}</span>
        </a>
      </div>
    </div>
  </div>

  <div class="app-sidebar__footer" *ngIf="!isCollapsed">
    <span>لوحة تشغيل متجاوبة</span>
    <strong>v1.0</strong>
  </div>
</aside>
