<header class="app-header" [ngClass]="{ 'app-header--menu-open': isMobileMenuOpen }">
    <div class="app-header__inner">
        <div class="app-header__start">
            <button type="button" class="app-header__icon-button" (click)="menuToggle.emit()" [attr.aria-label]="isMobileMenuOpen ? 'إغلاق القائمة' : 'فتح القائمة'">
        <i class="fas" [ngClass]="isMobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
      </button>

            <a class="app-header__brand" routerLink="/admin/dashboard">
                <img src="logo.png" alt="SMS Sender" />
                <div>
                    <strong>قارئ الرسائل</strong>
                </div>
            </a>
        </div>

        <div class="app-header__end">
            <li class="nav-item user-dropdown user-notifications" ngbDropdown display="dynamic" placement="bottom-start">
                <a class="nav-link without-arrow dropdown-toggle d-flex align-items-center text-white" role="button" tabindex="0" id="userDropdown" ngbDropdownToggle>
                    <span class="position-relative">
          <span class="alert-count">0</span>
                    <i class="far fa-bell"></i>
                    </span>
                </a>
                <div ngbDropdownMenu aria-labelledby="userDropdown" class="dropdown-menu dropdown-user-menu w-100 min-width-360 py-0">
                    <div class="msg-header">
                        <p class="msg-header-clear m-0 ms-auto">كل الرسائل</p>
                    </div>
                    <div class="header-message-list small-scroll overflow-auto max-height-300">
                        <a class="dropdown-item">
                            <div class="d-flex align-items-center">
                                <div class="notify me-2 bg-light-danger text-danger me-2"><i class="fas fa-wallet"></i></div>
                                <div class="flex-grow-1">
                                    <h6 class="msg-name">New Orders <span class="msg-time float-end">2 min ago</span></h6>
                                    <p class="msg-info">You have recived new orders</p>
                                </div>
                            </div>
                        </a>
                        <a class="dropdown-item">
                            <div class="d-flex align-items-center">
                                <div class="notify me-2 bg-light-primary text-primary"><i class="fas fa-wallet"></i></div>
                                <div class="flex-grow-1">
                                    <h6 class="msg-name">New 24 authors<span class="msg-time float-end">1 day ago</span></h6>
                                    <p class="msg-info">24 new authors joined last week</p>
                                </div>
                            </div>
                        </a>
                    </div>
                    <div class="text-center msg-footer">عرض جميع الرسائل</div>
                </div>
            </li>
            <a class="app-header__shortcut" routerLink="/admin/user">
                <i class="fas fa-sliders-h"></i>
                <span>الإعدادات</span>
            </a>

            <div class="user-menu" ngbDropdown placement="bottom-end">
                <button type="button" class="user-menu__trigger" ngbDropdownToggle>
                    <span class="user-menu__avatar">{{ userInitials }}</span>
                    <span class="user-menu__details">
                        <strong>{{ userName }}</strong>
                    </span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div ngbDropdownMenu class="user-menu__dropdown">
                    <div class="user-menu__summary">
                        <strong>{{ userName }}</strong>
                        <span>{{ roleName }}</span>
                    </div>

                    <a ngbDropdownItem routerLink="/admin/user-profile">
                        <i class="fas fa-user-circle"></i>
                        <span>الملف الشخصي</span>
                    </a>

                    <a ngbDropdownItem routerLink="/admin/user">
                        <i class="fas fa-cog"></i>
                        <span>إعدادات النظام</span>
                    </a>

                    <button type="button" ngbDropdownItem class="text-danger" (click)="logOut()">
            <i class="fas fa-right-from-bracket"></i>
            <span>تسجيل الخروج</span>
          </button>
                </div>
            </div>
        </div>
    </div>
</header>
