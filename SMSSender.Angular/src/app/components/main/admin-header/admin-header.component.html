<header class="app-header" [ngClass]="{ 'app-header--menu-open': isMobileMenuOpen }">
    <div class="app-header__inner">
        <div class="app-header__start">
            <button type="button" class="app-header__icon-button" (click)="menuToggle.emit()" [attr.aria-label]="isMobileMenuOpen ? 'إغلاق القائمة' : 'فتح القائمة'">
        <i class="fas" [ngClass]="isMobileMenuOpen ? 'fa-times' : 'fa-bars'"></i>
      </button>

            <a class="app-header__brand" routerLink="/admin/dashboard">
                <img src="logo.png" alt="SMS Sender" />
                <div>
                    <strong>قارئ الرسائل</strong>
                </div>
            </a>
        </div>

        <div class="app-header__end">
            <a class="app-header__shortcut" routerLink="/admin/user">
                <i class="fas fa-sliders-h"></i>
                <span>الإعدادات</span>
            </a>

            <div class="user-menu" ngbDropdown placement="bottom-end">
                <button type="button" class="user-menu__trigger" ngbDropdownToggle>
                    <span class="user-menu__avatar">{{ userInitials }}</span>
                    <span class="user-menu__details">
                        <strong>{{ userName }}</strong>
                    </span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div ngbDropdownMenu class="user-menu__dropdown">
                    <div class="user-menu__summary">
                        <strong>{{ userName }}</strong>
                        <span>{{ roleName }}</span>
                    </div>

                    <a ngbDropdownItem routerLink="/admin/user-profile">
                        <i class="fas fa-user-circle"></i>
                        <span>الملف الشخصي</span>
                    </a>

                    <a ngbDropdownItem routerLink="/admin/user">
                        <i class="fas fa-cog"></i>
                        <span>إعدادات النظام</span>
                    </a>

                    <button type="button" ngbDropdownItem class="text-danger" (click)="logOut()">
            <i class="fas fa-right-from-bracket"></i>
            <span>تسجيل الخروج</span>
          </button>
                </div>
            </div>
        </div>
    </div>
</header>
