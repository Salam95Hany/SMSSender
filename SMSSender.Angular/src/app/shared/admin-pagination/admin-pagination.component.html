<div class="pagination-container" dir="rtl">
  <div class="pagination-summary">
    <span>عرض</span>
    <strong>{{ showingStr }}</strong>
    <span>من أصل</span>
    <strong>{{ totalCount }}</strong>
  </div>

  <pagination
    [(ngModel)]="currentPage"
    [boundaryLinks]="true"
    [totalItems]="totalCount"
    [itemsPerPage]="pageSize"
    [maxSize]="maxSize"
    previousText="السابق"
    nextText="التالي"
    firstText="الأول"
    lastText="الأخير"
    (pageChanged)="pageChangeEvent($event)"
  ></pagination>
</div>
