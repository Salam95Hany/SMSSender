<article
  class="stats-card"
  [ngClass]="{
    'stats-card--blue': statsInfo.status === 'blue',
    'stats-card--green': statsInfo.status === 'green',
    'stats-card--orange': statsInfo.status === 'orange',
    'stats-card--red': statsInfo.status === 'red'
  }"
>
  <div class="stats-card__main">
    <div class="stats-card__icon">
      <i class="{{ statsInfo.icon }}"></i>
    </div>

    <div class="stats-card__content">
      <span class="stats-card__number">{{ statsInfo.number }}</span>
      <h3>{{ statsInfo.text }}</h3>
    </div>
  </div>

  <div class="stats-card__footer">
    <span>قراءة مباشرة</span>
    <i class="fas fa-arrow-left"></i>
  </div>
</article>
